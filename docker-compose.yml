services:
  postgres:
    image: postgres:16-alpine
    container_name: estoque-inteligente-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-estoque_inteligente}
      POSTGRES_USER: ${POSTGRES_USER:-estoque}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estoque}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
